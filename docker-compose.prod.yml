services:
  bot:
    build:
      context: .
      target: production-bot
    environment:
      DATABASE_URL: postgresql://fluxcore:${POSTGRES_PASSWORD}@postgres:5432/fluxcore
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      lavalink:
        condition: service_healthy
    networks:
      - backend
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    profiles:
      - bot
      - full

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro
    environment:
      - _JAVA_OPTIONS=-Xmx256m
      - LAVALINK_SERVER_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header='Authorization: youshallnotpass' http://localhost:2333/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    profiles:
      - bot
      - full

  dashboard:
    build:
      context: .
      target: production-dashboard
    environment:
      DATABASE_URL: postgresql://fluxcore:${POSTGRES_PASSWORD}@postgres:5432/fluxcore
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    profiles:
      - dashboard
      - full

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: fluxcore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: fluxcore
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxcore"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DASHBOARD_DOMAIN: ${DASHBOARD_DOMAIN:-localhost}
    depends_on:
      - dashboard
    networks:
      - frontend
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
    profiles:
      - dashboard
      - full

  backup:
    image: postgres:18-alpine
    environment:
      PGHOST: postgres
      PGUSER: fluxcore
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: fluxcore
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./docker/backup.sh:/backup.sh:ro
      - backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "${BACKUP_SCHEDULE:-0 2 * * *} /backup.sh" | crontab -
        crond -f -l 2
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  frontend:
  backend:
    internal: true

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  backups:
