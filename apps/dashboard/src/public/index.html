<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FluxCore Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>FluxCore Dashboard</h1>
    <nav>
      <span class="user-info" id="user-info"></span>
      <a href="/auth/logout" id="logout-link" style="display:none">Logout</a>
    </nav>
  </header>

  <div class="container">
    <div id="login-view" class="login-box" style="display:none">
      <h2>FluxCore Dashboard</h2>
      <p style="color:var(--text-muted);margin-bottom:24px">Login with Discord to manage your server configurations.</p>
      <a href="/auth/login" class="btn">Login with Discord</a>
    </div>

    <div id="guilds-view" style="display:none">
      <h2>Select a Server</h2>
      <div class="guild-grid" id="guild-grid"></div>
    </div>
  </div>

  <script>
    async function init() {
      try {
        const res = await fetch('/auth/me');
        if (!res.ok) {
          document.getElementById('login-view').style.display = '';
          return;
        }

        const user = await res.json();
        document.getElementById('user-info').textContent = user.username;
        document.getElementById('logout-link').style.display = '';

        const guildsRes = await fetch('/api/guilds');
        if (!guildsRes.ok) throw new Error('Failed to fetch guilds');
        const guilds = await guildsRes.json();

        const grid = document.getElementById('guild-grid');
        if (guilds.length === 0) {
          grid.innerHTML = '<p class="empty">No servers found. Make sure the bot is in your server and you have Manage Server permission.</p>';
          return;
        }

        for (const guild of guilds) {
          const card = document.createElement('div');
          card.className = 'guild-card';
          card.onclick = () => { window.location.href = '/guild.html?id=' + guild.id; };

          const iconHtml = guild.icon
            ? '<img src="https://cdn.discordapp.com/icons/' + guild.id + '/' + guild.icon + '.png?size=128" alt="">'
            : '<div class="placeholder-icon">' + guild.name.charAt(0).toUpperCase() + '</div>';

          card.innerHTML = iconHtml + '<div>' + escapeHtml(guild.name) + '</div>';
          grid.appendChild(card);
        }

        document.getElementById('guilds-view').style.display = '';
      } catch (e) {
        document.getElementById('login-view').style.display = '';
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>
