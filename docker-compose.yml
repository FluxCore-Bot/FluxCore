services:
  bot:
    build:
      context: .
      target: development
    command: sh -c "pnpm db:deploy && pnpm dev"
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    env_file:
      - .env.dev
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: fluxcore
      POSTGRES_PASSWORD: fluxcore
      POSTGRES_DB: fluxcore
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxcore"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
