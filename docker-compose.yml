services:
  bot:
    build:
      context: .
      target: development
    command: sh -c "cd packages/database && pnpm prisma migrate deploy && cd /app && pnpm turbo run dev --filter=@fluxcore/bot"
    volumes:
      - ./packages:/app/packages
      - ./apps:/app/apps
      - ./turbo.json:/app/turbo.json
    env_file:
      - .env.dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fluxcore
    restart: unless-stopped
    profiles:
      - bot
      - full

  dashboard:
    build:
      context: .
      target: development
    command: sh -c "pnpm turbo run dev --filter=@fluxcore/dashboard"
    volumes:
      - ./packages:/app/packages
      - ./apps:/app/apps
      - ./turbo.json:/app/turbo.json
    ports:
      - "3000:3000"
    env_file:
      - .env.dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fluxcore
    restart: unless-stopped
    profiles:
      - dashboard
      - full

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: fluxcore
      POSTGRES_PASSWORD: fluxcore
      POSTGRES_DB: fluxcore
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxcore"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fluxcore
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fluxcore.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fluxcore
    restart: unless-stopped
    profiles:
      - tools

networks:
  fluxcore:

volumes:
  pgdata:
