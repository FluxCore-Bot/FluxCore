services:
  bot:
    build:
      context: .
      target: development
    command: sh -c "cd packages/database && pnpm prisma migrate deploy && cd /app && pnpm turbo run dev --filter=@fluxcore/bot"
    volumes:
      - ./packages:/app/packages
      - ./apps:/app/apps
      - ./turbo.json:/app/turbo.json
    env_file:
      - .env.dev
    depends_on:
      postgres:
        condition: service_healthy
      lavalink:
        condition: service_healthy
    networks:
      - fluxcore
    restart: unless-stopped
    profiles:
      - bot
      - full

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro
    environment:
      - _JAVA_OPTIONS=-Xmx128m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header='Authorization: youshallnotpass' http://localhost:2333/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fluxcore
    restart: unless-stopped
    profiles:
      - bot
      - full

  dashboard:
    build:
      context: .
      target: development
    command: sh -c "pnpm install --frozen-lockfile && pnpm turbo run dev --filter=@fluxcore/dashboard"
    volumes:
      - ./packages:/app/packages
      - ./apps:/app/apps
      - ./turbo.json:/app/turbo.json
    ports:
      - "3000:3000"
      - "5173:5173"
    env_file:
      - .env.dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fluxcore
    restart: unless-stopped
    profiles:
      - dashboard
      - full

  # === Preview: run prebuilt dist/ files (pnpm build first) ===

  preview-bot:
    build:
      context: .
      target: development
    command: sh -c "cd packages/database && pnpm prisma migrate deploy && cd /app && node apps/bot/dist/index.js"
    environment:
      - NODE_ENV=production
    volumes:
      - ./packages:/app/packages
      - ./apps:/app/apps
    env_file:
      - .env.dev
    depends_on:
      postgres:
        condition: service_healthy
      preview-lavalink:
        condition: service_healthy
    networks:
      - fluxcore
    restart: unless-stopped
    profiles:
      - preview

  preview-dashboard:
    build:
      context: .
      target: development
    command: sh -c "cd packages/database && pnpm prisma migrate deploy && cd /app && node apps/dashboard/dist/server/index.js"
    environment:
      - NODE_ENV=production
    volumes:
      - ./packages:/app/packages
      - ./apps:/app/apps
    ports:
      - "3000:3000"
    env_file:
      - .env.dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fluxcore
    restart: unless-stopped
    profiles:
      - preview

  preview-lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro
    environment:
      - _JAVA_OPTIONS=-Xmx128m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header='Authorization: youshallnotpass' http://localhost:2333/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fluxcore
    restart: unless-stopped
    profiles:
      - preview

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: fluxcore
      POSTGRES_PASSWORD: fluxcore
      POSTGRES_DB: fluxcore
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxcore"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fluxcore
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fluxcore.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fluxcore
    restart: unless-stopped
    profiles:
      - tools

networks:
  fluxcore:

volumes:
  pgdata:
